name: 'Security - Generate SARIF Name'
description: 'Rename SARIF files to standardized format: {env}-{scanner}-{branch}-{commit}-{runid}.sarif'

inputs:
  scanner-name:
    description: 'Scanner name (checkov, tfsec, trivy)'
    required: true

  source-file:
    description: 'Source SARIF file to rename'
    required: true

  environment:
    description: 'Target environment (dev, stage, prod)'
    required: true

outputs:
  renamed-file:
    description: 'New SARIF filename'
    value: ${{ steps.rename.outputs.filename }}

  renamed-path:
    description: 'Full path to renamed SARIF file'
    value: ${{ steps.rename.outputs.filepath }}

runs:
  using: 'composite'
  steps:
    - name: Rename SARIF file
      id: rename
      shell: bash
      run: |
        SOURCE_FILE="${{ inputs.source-file }}"
        SCANNER="${{ inputs.scanner-name }}"
        ENV="${{ inputs.environment }}"

        # Extract repository name (without owner)
        REPO_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)

        # Extract Git context
        # Use GITHUB_HEAD_REF for PRs (source branch), fallback to GITHUB_REF_NAME for push events
        BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
        # Sanitize branch name for filename (replace / with -)
        BRANCH_SAFE=$(echo "$BRANCH" | sed 's/\//-/g')

        # For PRs, use the actual PR head commit, not the merge commit
        # GITHUB_SHA is the merge commit for PRs, but we want the actual commit from the PR branch
        if [ -n "$GITHUB_HEAD_REF" ]; then
          # This is a PR - use the head SHA from event context
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
        else
          # This is a push or other event - use GITHUB_SHA
          COMMIT_SHA="${GITHUB_SHA}"
        fi
        COMMIT_SHORT="${COMMIT_SHA:0:7}"
        RUN_ID="${GITHUB_RUN_ID}"

        # Construct new filename with repository name
        NEW_FILENAME="${ENV}-${REPO_NAME}-${SCANNER}-${BRANCH_SAFE}-${COMMIT_SHORT}-${RUN_ID}.sarif"

        # Rename file if source exists
        if [ -f "$SOURCE_FILE" ]; then
          mv "$SOURCE_FILE" "$NEW_FILENAME"
          echo "✅ Renamed $SOURCE_FILE → $NEW_FILENAME"
          echo "filename=$NEW_FILENAME" >> $GITHUB_OUTPUT
          echo "filepath=$(pwd)/$NEW_FILENAME" >> $GITHUB_OUTPUT
        else
          echo "::warning::Source file $SOURCE_FILE not found, skipping rename"
          echo "filename=" >> $GITHUB_OUTPUT
          echo "filepath=" >> $GITHUB_OUTPUT
          exit 1
        fi
