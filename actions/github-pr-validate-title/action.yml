# Validates that a pull request title follows the Conventional Commits specification.
# See: https://www.conventionalcommits.org/
#
# Supported types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
# Pattern: <type>[optional scope][optional !]: <description>
#
# Usage:
#   - uses: paloitmbb/mss-devops-workflow/actions/github-pr-validate-title@main

name: 'GitHub - PR Validate Title'
description: 'Validates pull request title against the Conventional Commits standard'

runs:
  using: 'node20'
  main: 'dist/index.js'
