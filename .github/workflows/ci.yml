name: PR - Validate Actions & Workflows

# ============================================================================
# PR Validation Workflow
#
# Lightweight syntax check for all GitHub Actions YAML files in this repo.
# Required status check for branch protection.
#
# What it validates:
# - YAML syntax correctness across all workflow and action files
# - Indentation, key duplication, line length, truthy values
# ============================================================================

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/**'
      - 'actions/**'
      - '*-actions/**'

permissions:
  contents: read

jobs:
  build:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate
        run: echo "CI passed"
