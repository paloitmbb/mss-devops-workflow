name: CI - Compile Agentic Workflows

# ============================================================================
# Agentic Workflow Compilation
#
# Recompiles any agentic workflow (.md) source into its corresponding
# .lock.yml file whenever changes are merged to the main branch.
#
# Uses the `gh aw compile` CLI (gh-aw extension) to regenerate lock files
# and opens a PR against main with the updated lock file(s).
#
# Trigger: push to main when any .md workflow source in .github/workflows/
#          is added or updated (i.e. on PR merge).
# ============================================================================

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*.md'
  workflow_dispatch:

# Restrict the built-in GITHUB_TOKEN to read-only; all write operations
# are performed via the short-lived GitHub App installation token generated
# in the first step.
permissions:
  contents: read

jobs:
  compile:
    name: 🔨 Compile Agentic Workflow Lock Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@3ff1caaa28b64c9cc276b8f5d7b885104e4ac83d # v1.12.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Install gh-aw CLI extension
        run: gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Compile changed agentic workflow(s)
        run: |
          # On workflow_dispatch: compile all .md files (handles missing lock files).
          # On push: compile only the .md files changed in the merge commit.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_MD=$(find .github/workflows -maxdepth 1 -name '*.md' | sort)
            echo "Manual dispatch — compiling all agentic workflow files:"
          else
            TARGET_MD=$(git diff --name-only HEAD~1..HEAD -- '.github/workflows/*.md')
            echo "Push trigger — compiling changed agentic workflow files:"
          fi

          if [ -z "$TARGET_MD" ]; then
            echo "No agentic workflow .md files to compile."
            exit 0
          fi

          echo "$TARGET_MD"

          for md_file in $TARGET_MD; do
            # Derive the workflow name (filename without path and .md extension)
            workflow_name=$(basename "$md_file" .md)
            echo "Compiling: $workflow_name"
            gh aw compile "$workflow_name"
          done
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Open PR with updated lock file(s)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # Authenticate git push using the short-lived GitHub App installation token
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}
          # Safely stage any lock files that exist (glob may match nothing if all were deleted)
          find .github/workflows -maxdepth 1 -name '*.lock.yml' | xargs -r git add
          if git diff --staged --quiet; then
            echo "No lock file changes to commit."
            exit 0
          fi

          BRANCH="ci/recompile-agentic-locks"
          git checkout -b "$BRANCH"
          git commit -m "ci: recompile agentic workflow lock file(s) [skip ci]"
          git push --force origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "ci: recompile agentic workflow lock file(s)" \
            --body "Automated PR to update agentic workflow lock file(s) after source changes merged to main." \
          && echo "PR created successfully." \
          || {
            # PR may already exist — check and skip if so, otherwise fail
            if gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
              echo "PR already open for branch $BRANCH — force-push updated it."
            else
              echo "ERROR: Failed to create PR."
              exit 1
            fi
          }
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
