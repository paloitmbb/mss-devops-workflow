name: CI - Compile Agentic Workflows

# ============================================================================
# Agentic Workflow Compilation
#
# Recompiles agentic workflow (.md) sources into their corresponding
# .lock.yml files.
#
# Uses the `gh aw compile` CLI (gh-aw extension) to regenerate lock files
# and commits the results back to the caller's branch.
#
# Trigger: workflow_call — called by consumer workflows passing the names
#          of the agentic workflow(s) to (re)compile.
# ============================================================================

on:
  workflow_call:
    inputs:
      workflow-names:
        description: >
          Space-separated list of agentic workflow names (without .md extension)
          to compile. Example: 'pr-title-validate my-other-workflow'
        required: true
        type: string

permissions:
  contents: write

jobs:
  compile:
    name: 🔨 Compile Agentic Workflow Lock Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install gh-aw CLI extension
        run: gh extension install github/gh-aw
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile agentic workflow(s)
        run: |
          for workflow_name in ${{ inputs.workflow-names }}; do
            echo "Compiling: $workflow_name"
            gh aw compile "$workflow_name"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated lock file(s)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/*.lock.yml
          git diff --staged --quiet && echo "No lock file changes to commit." || \
            git commit -m "ci: recompile agentic workflow lock file(s) [skip ci]"
          git push
